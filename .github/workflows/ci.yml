name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        sanitizer: [asan, tsan]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: configure
        run: |
          if [ "${{ matrix.sanitizer }}" = "tsan" ]; then
            cmake -B build -DCMAKE_BUILD_TYPE=Debug -DSSIKV_TSAN=ON -DSSIKV_ASAN=OFF
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Debug -DSSIKV_ASAN=ON
          fi

      - name: build
        run: cmake --build build -j

      - name: ctest
        run: ctest --test-dir build --output-on-failure

      - name: demos
        run: |
          fail=0
          for d in build/demos/demo_*; do
            if ! "$d"; then
              echo "FAIL: $d"
              fail=1
            fi
          done
          exit $fail
